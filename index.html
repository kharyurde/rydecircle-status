<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RydeCircle — API Health</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0b;
  --surface:#111113;
  --surface-2:#18181b;
  --border:rgba(255,255,255,0.06);
  --text:#f5f5f5;
  --muted:#6b6b72;
  --green:#22c55e;
  --amber:#f59e0b;
  --red:#ef4444;
  --accent:#6ee7b7;
  --mono:'DM Mono', monospace;
  --sans:'Syne', sans-serif;
}
body{
  background: radial-gradient(circle at top, #111 0%, #0a0a0b 60%);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.topbar{
  position:sticky;
  top:0;
  backdrop-filter: blur(8px);
  background: rgba(10,10,11,0.7);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}
.logo{font-size:12px;letter-spacing:.12em;color:var(--muted);}
.logo span{color:var(--accent);}
#clock{font-family:var(--mono);font-size:11px;color:var(--muted);}
.main{
  max-width:1100px;
  margin:auto;
  padding:32px 20px 60px;
  flex:1;
}
.hero-title{
  font-size:clamp(28px,5vw,44px);
  font-weight:700;
  margin-bottom:10px;
}
.hero-title em{color:var(--accent);font-style:normal;}
.url-pill{
  font-family:var(--mono);
  font-size:11px;
  background:var(--surface-2);
  padding:6px 10px;
  border-radius:6px;
  display:inline-block;
  color:var(--muted);
  margin-bottom:20px;
}
.status-pill{
  display:inline-flex;
  gap:8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-family:var(--mono);
  margin:20px 0;
  border:1px solid var(--border);
}
.status-pill.online{color:var(--green);background:rgba(34,197,94,.1);}
.status-pill.offline{color:var(--red);background:rgba(239,68,68,.1);}
.status-pill.checking{color:var(--amber);background:rgba(245,158,11,.1);}
.status-pill.idle{color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
.metric-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  margin-bottom:20px;
}
.metric{
  padding:16px;
  border-radius:12px;
  background:var(--surface);
  transition:.2s;
}
.metric:hover{transform:translateY(-2px);}
.metric-label{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;}
.metric-value{font-size:22px;font-weight:700;}
.good{color:var(--green);}
.warn{color:var(--amber);}
.bad{color:var(--red);}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
}
button{
  padding:10px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  cursor:pointer;
}
button.primary{
  background:rgba(110,231,183,.1);
  color:var(--accent);
}
.history-bars{
  display:flex;
  gap:4px;
  height:60px;
}
.bar{
  flex:1;
  border-radius:4px;
  opacity:.7;
}
.bar.ok{background:var(--green);}
.bar.slow{background:var(--amber);}
.bar.fail{background:var(--red);}
pre{
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  overflow:auto;
  background:var(--surface);
  padding:12px;
  border-radius:12px;
}
@media(max-width:600px){
  .metric-value{font-size:18px;}
  .hero-title{font-size:28px;}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">Ryde<span>Circle</span></div>
  <div id="clock">--:--</div>
</header>

<main class="main">
<h1 class="hero-title">API <em>Health</em></h1>
<div class="url-pill">https://rydecircle-api.onrender.com/api/health</div>

<div id="status-pill" class="status-pill idle">
  <span class="dot"></span>
  <span id="status-text">Not checked</span>
</div>

<div class="metric-grid">
  <div class="metric"><div class="metric-label">API</div><div id="m-api" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">DB</div><div id="m-db" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">Latency</div><div id="m-ms" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">Uptime</div><div id="m-uptime" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">Telegram</div><div id="m-telegram" class="metric-value">—</div></div>
</div>

<div class="actions">
  <button class="primary" onclick="check()">Check now</button>
  <button onclick="toggle()">Auto-refresh</button>
</div>

<div class="card">
  <div class="history-bars" id="bars"></div>
</div>

<br>

<div class="card">
  <pre id="raw">Waiting for first check…</pre>
</div>
</main>

<script>
const API="https://rydecircle-api.onrender.com/api/health";
const TELEGRAM_API="https://rydecircle-api.onrender.com/api/health/telegram";
const HISTORY_API="https://rydecircle-api.onrender.com/api/health/history";
let history=[];
let auto=null;

function clock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString();
}
setInterval(clock,1000);clock();

function setStatus(type,text){
  const el=document.getElementById('status-pill');
  el.className='status-pill '+type;
  document.getElementById('status-text').textContent=text;
}

function setMetric(id,val,cls){
  const el=document.getElementById(id);
  el.textContent=val;
  el.className="metric-value "+cls;
}

function renderHistory(){
  const el=document.getElementById('bars');
  el.innerHTML=history.map(h=>{
    let cls=!h.ok?'fail':h.ms>1500?'slow':'ok';
    let height=Math.min(100,h.ms/10);
    return `<div class="bar ${cls}" style="height:${height}%"></div>`;
  }).join('');
}

async function fetchHistory(){
  try{
    const res=await fetch(HISTORY_API);
    const data=await res.json();
    history=data.map(h=>({ok:h.ok,ms:h.response_time}));
    renderHistory();
  }catch(e){console.error("History fetch failed",e);}
}

async function checkTelegram(){
  try{
    const res=await fetch(TELEGRAM_API);
    const data=await res.json();
    setMetric('m-telegram',data.ok ? data.bot : 'Fail', data.ok?'good':'bad');
  }catch(e){setMetric('m-telegram','Error','bad');}
}

async function check(){
  setStatus('checking','Checking...');
  let start=Date.now();
  try{
    const r=await fetch(API);
    const ms=Date.now()-start;
    const d=await r.json();
    const ok=r.ok && d.ok;

    history.push({ok,ms});
    if(history.length>50) history.shift();

    setStatus(ok?'online':'offline',ok?'Operational':'Down');
    setMetric('m-api',ok?'OK':'Fail',ok?'good':'bad');
    setMetric('m-db',d.db||'—', d.db==='connected'?'good':'bad');
    setMetric('m-ms',ms+'ms', ms<500?'good':ms<1500?'warn':'bad');
    const uptime=Math.round(history.filter(h=>h.ok).length/history.length*100);
    setMetric('m-uptime',uptime+'%',uptime>95?'good':uptime>90?'warn':'bad');

    document.getElementById('raw').textContent=JSON.stringify(d,null,2);

    await checkTelegram();
  }catch(e){
    setStatus('offline','Error');
    setMetric('m-api','Fail','bad');
    setMetric('m-db','—','bad');
    setMetric('m-ms','—','bad');
    setMetric('m-uptime','—','bad');
    setMetric('m-telegram','Error','bad');
    document.getElementById('raw').textContent=e;
  }
  renderHistory();
}

function toggle(){
  if(auto){clearInterval(auto);auto=null;return;}
  auto=setInterval(check,60000);
}

// initial load
fetchHistory();
check();
</script>
</body>
</html>
