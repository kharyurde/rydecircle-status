<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RydeCircle — API Health</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0a0a0b;
  --surface:#111113;
  --surface-2:#18181b;
  --border:rgba(255,255,255,0.06);
  --text:#f5f5f5;
  --muted:#6b6b72;
  --green:#22c55e;
  --amber:#f59e0b;
  --red:#ef4444;
  --accent:#6ee7b7;
  --mono:'DM Mono', monospace;
  --sans:'Syne', sans-serif;
}

body{
  background: radial-gradient(circle at top, #111 0%, #0a0a0b 60%);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
}

/* ─── topbar ─── */
.topbar{
  position:sticky;
  top:0;
  backdrop-filter: blur(8px);
  background: rgba(10,10,11,0.7);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

.logo{
  font-size:12px;
  letter-spacing:.12em;
  color:var(--muted);
}
.logo span{color:var(--accent);}

.topbar-right{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
}

/* ─── layout ─── */
.main{
  max-width:1100px;
  margin:auto;
  padding:32px 20px 60px;
}

/* ─── hero ─── */
.hero-title{
  font-size:clamp(28px,5vw,44px);
  font-weight:700;
  margin-bottom:10px;
}
.hero-title em{color:var(--accent);font-style:normal;}

.url-pill{
  font-family:var(--mono);
  font-size:11px;
  background:var(--surface-2);
  padding:6px 10px;
  border-radius:6px;
  display:inline-block;
  color:var(--muted);
}

/* ─── status ─── */
.status-pill{
  display:inline-flex;
  gap:8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-family:var(--mono);
  margin:20px 0;
  border:1px solid var(--border);
}

.status-pill.online{color:var(--green);background:rgba(34,197,94,.1);}
.status-pill.offline{color:var(--red);background:rgba(239,68,68,.1);}
.status-pill.checking{color:var(--amber);background:rgba(245,158,11,.1);}
.status-pill.idle{color:var(--muted);}

.dot{
  width:8px;height:8px;border-radius:50%;background:currentColor;
}

/* ─── cards ─── */
.card{
  background:linear-gradient(145deg,#111,#0d0d0e);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
}

/* ─── metrics ─── */
.metric-grid{
  display:grid;
  gap:12px;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  margin-bottom:20px;
}

.metric{
  padding:16px;
  border-radius:12px;
  background:var(--surface);
  transition:.2s;
}
.metric:hover{transform:translateY(-2px);}

.metric-label{
  font-size:10px;
  color:var(--muted);
  font-family:var(--mono);
  margin-bottom:6px;
}

.metric-value{
  font-size:22px;
  font-weight:700;
}

.good{color:var(--green);}
.warn{color:var(--amber);}
.bad{color:var(--red);}

/* ─── buttons ─── */
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:20px 0;
}

button{
  padding:10px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  cursor:pointer;
}

button.primary{
  background:rgba(110,231,183,.1);
  color:var(--accent);
}

/* ─── history ─── */
.history-bars{
  display:flex;
  gap:4px;
  height:60px;
}

.bar{
  flex:1;
  border-radius:4px;
  opacity:.7;
}

.bar.ok{background:var(--green);}
.bar.slow{background:var(--amber);}
.bar.fail{background:var(--red);}

/* ─── raw ─── */
pre{
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
  overflow:auto;
}

/* ─── mobile tweaks ─── */
@media(max-width:600px){
  .metric-value{font-size:18px;}
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">Ryde<span>Circle</span></div>
  <div id="clock">--:--</div>
</header>

<main class="main">

<h1 class="hero-title">API <em>Health</em></h1>
<div class="url-pill">/api/health</div>

<div id="status-pill" class="status-pill idle">
  <span class="dot"></span>
  <span id="status-text">Not checked</span>
</div>

<div class="metric-grid">
  <div class="metric"><div class="metric-label">API</div><div id="m-api" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">DB</div><div id="m-db" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">Latency</div><div id="m-ms" class="metric-value">—</div></div>
  <div class="metric"><div class="metric-label">Uptime</div><div id="m-uptime" class="metric-value">—</div></div>
</div>

<div class="actions">
  <button class="primary" onclick="check()">Check</button>
  <button onclick="toggle()">Auto</button>
</div>

<div class="card">
  <div class="history-bars" id="bars"></div>
</div>

<br>

<div class="card">
  <pre id="raw">Waiting...</pre>
</div>

</main>

<script>
const API="https://rydecircle-api.onrender.com/api/health";
let history=[];
let auto=null;

function clock(){
document.getElementById('clock').textContent=new Date().toLocaleTimeString();
}
setInterval(clock,1000);clock();

function setStatus(type,text){
const el=document.getElementById('status-pill');
el.className='status-pill '+type;
document.getElementById('status-text').textContent=text;
}

function set(id,val,cls){
const el=document.getElementById(id);
el.textContent=val;
el.className="metric-value "+cls;
}

function render(){
const el=document.getElementById('bars');
el.innerHTML=history.map(h=>{
let c=!h.ok?'fail':h.ms>1500?'slow':'ok';
return `<div class="bar ${c}" style="height:${Math.min(100,h.ms/10)}%"></div>`;
}).join('');
}

async function check(){
setStatus('checking','Checking...');
let t=Date.now();
try{
let r=await fetch(API);
let ms=Date.now()-t;
let d=await r.json();
let ok=r.ok && d.ok;

history.push({ok,ms});
if(history.length>20)history.shift();

setStatus(ok?'online':'offline',ok?'Operational':'Down');
set('m-api',ok?'OK':'Fail',ok?'good':'bad');
set('m-db',d.db, d.db==='connected'?'good':'bad');
set('m-ms',ms+'ms', ms<500?'good':ms<1500?'warn':'bad');

document.getElementById('raw').textContent=JSON.stringify(d,null,2);

}catch(e){
setStatus('offline','Error');
}
render();
}

function toggle(){
if(auto){clearInterval(auto);auto=null;return;}
auto=setInterval(check,60000);
}

check();
</script>

</body>
</html>
